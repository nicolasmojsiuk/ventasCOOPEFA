{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>{% block title %}Venta Facil{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body class="sb-nav-fixed">
    <!-- TOP NAV -->
    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <a class="navbar-brand ps-3" href="{% url 'index' %}">
            <img src="{% static 'assets/img/logoSoft.png' %}"
                 alt="Venta Facil"
                 style="height: 45px; width: auto;">
        </a>

        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0"
                id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <div id="layoutSidenav">
        <!-- SIDEBAR -->
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">Menu</div>

                        <a class="nav-link" href="{% url 'index' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-home-alt"></i></div>
                            Inicio
                        </a>


                        <a class="nav-link" href="{% url 'gestionComercial:listaClientes' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-user-group"></i></div>
                            Clientes
                        </a>

                        <a class="nav-link" href="{% url 'gestionComercial:listaProductos' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-boxes-alt"></i></div>
                             Inventario
                        </a>

                        <a class="nav-link" href="{% url 'gestionComercial:cierreCaja' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-coins"></i></div>
                            Caja
                        </a>

                        <a class="nav-link" href="{% url 'gestionComercial:nuevaVenta' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                            Vender
                        </a>
                        <a class="nav-link" href="{% url 'gestionComercial:historialVentas' %}">
                            <div class="sb-nav-link-icon"><i class="fa-solid fa-receipt"></i></div>
                            Ventas historial
                        </a>


                        <a class="nav-link" href="{% url 'informes' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-chart-pie"></i></div>
                            Reportes
                        </a>

                        <a class="nav-link" href="{% url 'ajustes' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-gear"></i></div>
                            Ajustes
                        </a>
                    </div>
                </div>
            </nav>
        </div>

        <!-- CONTENT -->
        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">

                    {% block content %}
                    <!-- CONTENIDO POR DEFECTO (INICIO) -->
                    <h1 class="mt-4">Inicio</h1>
                    <p>SISTEMA DE GESTION FERIA COOPEFA.</p>
                    <img src="{% static 'assets/img/logo.png' %}"
                        alt="Venta Facil"
                        style="height: 200px; width: auto;">
                    <p>Programado por: Mojsiuk, Pablo Nicolas.</p>
                    {% endblock %}

                </div>
            </main>

            <!-- FOOTER -->
            <footer class="py-4 bg-light mt-auto">
                <div class="container-fluid px-4">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">
                            Copyright &copy; Venta Facil 2026
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
